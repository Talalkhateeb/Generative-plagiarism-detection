name: SPU Software Testing Pipeline — GPD.AI

on:
  push:
    branches: [main, software-dev]
  pull_request:
    branches: [main, software-dev]

env:
  PYTHON_VERSION: "3.11"
  DJANGO_SETTINGS_MODULE: GPD_Back.settings
  CI: "true"

jobs:
  # ═════════════════════════════════════════════
  # 🔐 1. SECURITY SCAN (GitLeaks)
  # ═════════════════════════════════════════════
  security:
    name: 🔐 Security Scan (GitLeaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═════════════════════════════════════════════
  # 🧪 2. UNIT + INTEGRATION TESTS
  # ═════════════════════════════════════════════
  tests:
    name: 🧪 Unit + Integration Tests
    runs-on: ubuntu-latest
    needs: security

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2019-latest
        env:
          SA_PASSWORD: "YourStrong!Pass123"
          ACCEPT_EULA: "Y"
        ports:
          - 1433:1433
        options: >-
          --health-cmd "exit 0"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y curl apt-transport-https unixodbc-dev gnupg2
          curl https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          curl https://packages.microsoft.com/config/ubuntu/22.04/prod.list | sudo tee /etc/apt/sources.list.d/msprod.list
          sudo apt-get update
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18 mssql-tools18

      - name: Install Python dependencies
        run: |
          pip install -r GPD_back/requirements.txt
          pip install pytest pytest-django

      - name: Wait for SQL Server (real fix)
        run: sleep 45
      - name: Wait for SQL Server login
        run: |
          for i in {1..30}; do
            /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong!Pass123' -Q "SELECT 1" -C && exit 0
            echo "Waiting for SQL Server to accept connections..."
            sleep 3
          done
          echo "SQL Server not ready"
          exit 1
      - name: Run migrations
        working-directory: GPD_back
        env:
          DB_ENGINE: mssql
          DB_NAME: tempdb
          DB_USER: sa
          DB_PASSWORD: YourStrong!Pass123
          DB_HOST: 127.0.0.1
          DB_PORT: 1433
          DB_ODBC_DRIVER: "ODBC Driver 18 for SQL Server"
        run: python manage.py migrate

      - name: Run tests
        working-directory: GPD_back
        env:
          DB_ENGINE: mssql
          DB_NAME: master
          DB_USER: sa
          DB_PASSWORD: YourStrong!Pass123
          DB_HOST: localhost
          DB_PORT: 1433
          DB_ODBC_DRIVER: "ODBC Driver 18 for SQL Server"
        run: pytest tests/ -v
    # ═════════════════════════════════════════════
  # 🎭 3. E2E TESTING (PLAYWRIGHT)
  # ═════════════════════════════════════════════
  e2e:
    name: 🎭 E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r GPD_back/requirements.txt
          pip install pytest-playwright
          playwright install chromium --with-deps

      # ✅ FIX DB
      - name: Set CI environment (SQLite safe mode)
        run: |
          echo "DB_ENGINE=django.db.backends.sqlite3" >> GPD_back/.env
          echo "DB_NAME=:memory:" >> GPD_back/.env

      - name: Run migrations
        working-directory: GPD_back
        run: python manage.py migrate --run-syncdb

      - name: Start server
        working-directory: GPD_back
        run: |
          python manage.py runserver 0.0.0.0:8000 &
          timeout 30s bash -c 'until curl -s http://localhost:8000; do sleep 1; done'

      - name: Run Playwright tests
        working-directory: GPD_back
        run: |
          pytest tests/test_e2e.py -v -m e2e \
            --base-url http://localhost:8000

  # ═════════════════════════════════════════════
  # ⚡ 4. PERFORMANCE TEST (LOCUST)
  # ═════════════════════════════════════════════
  performance:
    name: ⚡ Performance Testing (Locust)
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - name: Install Locust
        run: pip install locust

      - name: Start server (background)
        working-directory: GPD_back
        run: |
          pip install -r requirements.txt
          python manage.py migrate --run-syncdb
          python manage.py runserver 0.0.0.0:8000 &
          sleep 10

      - name: Run performance test
        run: |
          locust -f test_performance.py \
          --headless -u 10 -r 2 --run-time 30s \
          --host http://localhost:8000 \
          --html report.html

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: locust-report
          path: report.html
