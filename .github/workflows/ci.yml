name: GPD.AI — CI/CD Pipeline

on:
  push:
    branches: [main, software-dev]
  pull_request:
    branches: [main, software-dev]

env:
  PYTHON_VERSION: "3.11"
  # تأكدي أن GPD_Back مكتوبة بنفس حالة الأحرف في المجلد الفعلي
  DJANGO_SETTINGS_MODULE: GPD_Back.settings

jobs:
  secret-scan:
    name: 🔐 Secret Scan (GitLeaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: 🧪 Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: secret-scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        # نثبت المتطلبات من الـ Root
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-django pytest-cov

      - name: Create .env file
        # ننشئ ملف الـ .env داخل مجلد الباك لكي يراه manage.py
        working-directory: GPD_back
        run: |
          cat > .env << EOF
          SECRET_KEY=ci-test-secret-key
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          DB_ENGINE=django.db.backends.sqlite3
          DB_NAME=:memory:
          EOF

      - name: Run database migrations
        working-directory: GPD_back
        run: python manage.py migrate --run-syncdb
        env:
          DB_ENGINE: django.db.backends.sqlite3
          DB_NAME: ":memory:"

      - name: Run Unit Tests
        working-directory: GPD_back
        run: |
          pytest tests/test_unit.py -v \
            --cov=apps \
            --cov-report=xml:coverage.xml \
            -m "not e2e and not performance"
        env:
          DB_ENGINE: django.db.backends.sqlite3
          DB_NAME: ":memory:"

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: GPD_back/coverage.xml
          fail_ci_if_error: false

  e2e:
    name: 🧪 E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: GPD_back

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r ../requirements.txt
          pip install pytest-playwright
          playwright install chromium --with-deps

      - name: Prepare E2E database
        run: python manage.py migrate --run-syncdb
        env:
          DB_ENGINE: django.db.backends.sqlite3
          DB_NAME: /tmp/gpd_e2e.db

      - name: Start Django & Run E2E
        run: |
          python manage.py runserver 0.0.0.0:8000 &
          echo "Waiting for Django..."
          timeout 30s bash -c 'until curl -s http://localhost:8000; do sleep 1; done'
          pytest tests/test_e2e.py -v -m e2e
        env:
          DB_ENGINE: django.db.backends.sqlite3
          DB_NAME: /tmp/gpd_e2e.db
