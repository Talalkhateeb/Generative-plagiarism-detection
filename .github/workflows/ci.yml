name: SPU Software Testing Pipeline — GPD.AI

on:
  push:
    branches: [main, software-dev]
  pull_request:
    branches: [main, software-dev]

env:
  PYTHON_VERSION: "3.11"
  DJANGO_SETTINGS_MODULE: GPD_Back.settings
  CI: "true"

jobs:
  # ═════════════════════════════════════════════
  # 🔐 1. SECURITY SCAN (GitLeaks)
  # ═════════════════════════════════════════════
  security:
    name: 🔐 Security Scan (GitLeaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═════════════════════════════════════════════
  # 🧪 2. UNIT + INTEGRATION TESTS
  # ═════════════════════════════════════════════
  tests:
    name: 🧪 Unit + Integration Tests
    runs-on: ubuntu-latest
    needs: security

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r GPD_back/requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Create environment
        run: |
          cat > GPD_back/.env << EOF
          SECRET_KEY=ci-key
          DEBUG=True
          DB_ENGINE=django.db.backends.sqlite3
          DB_NAME=:memory:
          ALLOWED_HOSTS=localhost
          EOF

      - name: Run migrations
        working-directory: GPD_back
        run: python manage.py migrate --run-syncdb

      - name: Run Unit + Integration Tests
        working-directory: GPD_back
        run: |
          pytest tests/test_unit.py -v \
            --cov=apps \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload Coverage
        uses: codecov/codecov-action@v4
        with:
          file: GPD_back/coverage.xml
          fail_ci_if_error: false

  # ═════════════════════════════════════════════
  # 🎭 3. E2E TESTING (PLAYWRIGHT)
  # ═════════════════════════════════════════════
  e2e:
    name: 🎭 E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r GPD_back/requirements.txt
          pip install pytest-playwright
          playwright install chromium --with-deps

      - name: Run migrations
        working-directory: GPD_back
        run: python manage.py migrate --run-syncdb

      - name: Start server
        working-directory: GPD_back
        run: |
          python manage.py runserver 0.0.0.0:8000 &
          timeout 30s bash -c 'until curl -s http://localhost:8000; do sleep 1; done'

      - name: Run Playwright tests
        working-directory: GPD_back
        run: |
          pytest tests/test_e2e.py -v -m e2e \
            --base-url http://localhost:8000

  # ═════════════════════════════════════════════
  # ⚡ 4. PERFORMANCE TEST (LOCUST)
  # ═════════════════════════════════════════════
  performance:
    name: ⚡ Performance Testing (Locust)
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - name: Install Locust
        run: pip install locust

      - name: Run performance test
        working-directory: GPD_back
        run: |
          locust -f tests/test_performance.py \
          --headless -u 10 -r 2 --run-time 30s \
          --host http://localhost:8000 \
          --html report.html

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: locust-report
          path: GPD_back/report.html
