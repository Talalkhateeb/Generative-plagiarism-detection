name: GPD.AI — CI/CD Pipeline

on:
  push:
    branches: [main, software-dev]
  pull_request:
    branches: [main, software-dev]

env:
  PYTHON_VERSION: "3.11"
  DJANGO_SETTINGS_MODULE: GPD_Back.settings

jobs:
  secret-scan:
    name: 🔐 Secret Scan (GitLeaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: 🧪 Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: secret-scan
    defaults:
      run:
        working-directory: GPD_back

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r ../requirements.txt
          pip install pytest pytest-django pytest-cov

      - name: Create .env file for CI
        run: |
          cat > .env << EOF
          SECRET_KEY=ci-test-secret-key-not-for-production
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          DB_ENGINE=django.db.backends.sqlite3
          DB_NAME=:memory:
          EMAIL_BACKEND=django.core.mail.backends.console.EmailBackend
          EOF

      - name: Run database migrations
        run: python manage.py migrate --run-syncdb
        env:
          # نؤكد هنا مرة أخرى على استخدام SQLite لتجاوز أي إعدادات أخرى
          DB_ENGINE: django.db.backends.sqlite3
          DB_NAME: ":memory:"

      - name: Run Unit Tests
        run: |
          pytest tests/test_unit.py -v \
            --cov=apps \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -m "not e2e and not performance"

      - name: Run Integration Tests
        run: |
          pytest tests/test_integration.py -v \
            --cov=apps \
            --cov-append \
            --cov-report=term-missing \
            -m "not e2e and not performance"
      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          flags: unittests
          fail_ci_if_error: false

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: test

    defaults:
      run:
        working-directory: GPD_back

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install backend dependencies
        run: pip install -r ../requirements.txt

      - name: Install Playwright + browsers
        run: |
          pip install pytest-playwright
          playwright install chromium --with-deps

      - name: Create .env for E2E
        run: |
          cat > .env << EOF
          SECRET_KEY=ci-e2e-secret-key
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          DB_ENGINE=django.db.backends.sqlite3
          DB_NAME=/tmp/gpd_e2e.db
          EMAIL_BACKEND=django.core.mail.backends.console.EmailBackend
          CELERY_BROKER_URL=memory://
          EOF

      - name: Prepare E2E database
        run: |
          python manage.py migrate --run-syncdb

      - name: Start Django backend
        run: |
          python manage.py runserver 0.0.0.0:8000 &

          echo "Waiting for Django..."

          until curl -s http://localhost:8000; do
            sleep 1
          done

          echo "Django is up!"

      - name: Run Playwright E2E Tests
        run: |
          pytest tests/test_e2e.py -v \
            --base-url http://localhost:3000 \
            -m e2e --screenshot=only-on-failure
        env:
          BASE_URL: http://localhost:3000
        continue-on-error: true

      - name: Upload Playwright traces on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  performance:
    name: ⚡ Performance Smoke Test (Locust)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
