name: GPD.AI — CI/CD Pipeline

on:
  push:
    branches: [main, software-dev]
  pull_request:
    branches: [main, software-dev]

env:
  PYTHON_VERSION: "3.11"
  DJANGO_SETTINGS_MODULE: GPD_Back.settings

jobs:
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-django pytest-cov django

      - name: Move into backend folder
        working-directory: GPD_back
        run: echo "Now inside backend"

      - name: Create .env
        working-directory: GPD_back
        run: |
          cat > .env << EOF
          SECRET_KEY=ci-test-secret
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          DB_ENGINE=django.db.backends.sqlite3
          DB_NAME=:memory:
          EOF

      - name: Run migrations
        working-directory: GPD_back
        run: |
          python manage.py migrate --run-syncdb

      - name: Run tests
        working-directory: GPD_back
        run: |
          pytest -v
