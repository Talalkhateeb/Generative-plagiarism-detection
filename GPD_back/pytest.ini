[pytest]
DJANGO_SETTINGS_MODULE = GPD_Back.settings
python_files = tests/test_*.py
python_classes = Test*
python_functions = test_*
addopts = --ignore=tests/test_e2e.py --ignore=tests/test_performance.py

markers =
    unit: Pure unit tests (no DB)
    integration: Integration tests (requires DB)
    e2e: End-to-end Playwright tests (requires running frontend)
    performance: Locust performance tests
