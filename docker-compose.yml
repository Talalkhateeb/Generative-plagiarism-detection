version: "3.9"

services:

  # ── SQL Server ──────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gpd_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "GPD_Password123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "GPD_Password123!", "-Q", "SELECT 1"]
      interval: 10s
      retries: 10
      start_period: 30s

  # ── RabbitMQ ────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3-management
    container_name: gpd_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI → http://localhost:15672 (guest/guest)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: gpd_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ── MinIO ───────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: gpd_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"   # MinIO console → http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      retries: 5

  # ── MinIO bucket setup (runs once then exits) ───────────────────────────────
  minio_setup:
    image: minio/mc:latest
    container_name: gpd_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/veritas &&
        mc anonymous set download local/veritas &&
        echo 'Bucket veritas ready'
      "

  # ── Django Backend ──────────────────────────────────────────────────────────
  django:
    build:
      context: ./GPD_back
      dockerfile: Dockerfile
    container_name: gpd_django
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    env_file:
      - ./GPD_back/.env.docker
    ports:
      - "8000:8000"
    depends_on:
      sqlserver:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./GPD_back:/app

  # ── Celery Worker ───────────────────────────────────────────────────────────
  celery:
    build:
      context: ./GPD_back
      dockerfile: Dockerfile
    container_name: gpd_celery
    command: celery -A GPD_Back worker -l info
    env_file:
      - ./GPD_back/.env.docker
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      sqlserver:
        condition: service_healthy
    volumes:
      - ./GPD_back:/app

  # ── Storage Microservice ────────────────────────────────────────────────────
  storage:
    build:
      context: ./storage_service
      dockerfile: Dockerfile
    container_name: gpd_storage
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: veritas
      REDIS_HOST: redis
    ports:
      - "8002:8002"
    depends_on:
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./GPD_front
      dockerfile: Dockerfile
    container_name: gpd_frontend
    ports:
      - "3000:3000"
    depends_on:
      - django
    environment:
      - VITE_API_URL=http://localhost:8000/api

volumes:
  sqlserver_data:
  minio_data:
